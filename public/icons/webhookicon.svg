<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#00d4ff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
  <!-- top node -->
  <circle cx="12" cy="3.5" r="1.8" fill="#00d4ff" stroke="none"/>
  <!-- bottom-left node -->
  <circle cx="4.5" cy="18.5" r="1.8" fill="#00d4ff" stroke="none"/>
  <!-- bottom-right node -->
  <circle cx="19.5" cy="18.5" r="1.8" fill="#00d4ff" stroke="none"/>
  <!-- lines from top to both bottom nodes -->
  <line x1="12" y1="5.3" x2="5.3" y2="16.9"/>
  <line x1="12" y1="5.3" x2="18.7" y2="16.9"/>
  <!-- line between bottom nodes -->
  <line x1="6.3" y1="18.5" x2="17.7" y2="18.5"/>
</svg>
